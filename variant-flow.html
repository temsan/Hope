<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Надежда Жди — Течение</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0b0d12; color:#e8e6f0;
  font-family:'Cormorant Garamond',serif; overflow-x:hidden;
}
/* мраморный фон */
.marble{position:fixed;inset:0;z-index:0;opacity:.5;
  background:
   radial-gradient(ellipse 70% 50% at 20% 30%, rgba(60,40,120,.35), transparent 60%),
   radial-gradient(ellipse 60% 40% at 80% 70%, rgba(160,60,90,.25), transparent 60%),
   radial-gradient(ellipse 50% 60% at 60% 20%, rgba(30,90,130,.3), transparent 60%);
  animation:drift 24s ease-in-out infinite alternate}
@keyframes drift{to{transform:scale(1.15) rotate(3deg)}}

header{position:relative;z-index:2;text-align:center;padding:64px 20px 24px}
h1{font-size:clamp(2.2rem,6vw,4rem);font-weight:300;letter-spacing:.18em}
.subtitle{font-style:italic;opacity:.6;font-size:1.25rem}
.hint{opacity:.35;margin-top:10px}

/* горизонтальная река */
.river{
  position:relative;z-index:2;
  display:flex;gap:7vw;align-items:center;
  overflow-x:auto;scroll-snap-type:x mandatory;
  padding:6vh 12vw 10vh;
  scrollbar-width:none;
}
.river::-webkit-scrollbar{display:none}
.piece{
  flex:0 0 auto;scroll-snap-align:center;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.blob{
  width:min(58vw,440px);height:min(58vw,440px);overflow:hidden;
  animation:morph 9s ease-in-out infinite alternate;
  box-shadow:0 25px 70px rgba(0,0,0,.6);
  transition:transform .5s;
}
.piece:nth-child(odd) .blob{animation-duration:11s;animation-delay:-4s}
.piece:hover .blob{transform:scale(1.05)}
.blob img{width:100%;height:100%;object-fit:cover;transform:scale(1.15);transition:transform 1.2s}
.piece:hover .blob img{transform:scale(1.02)}
@keyframes morph{
  0%  {border-radius:58% 42% 55% 45% / 48% 60% 40% 52%}
  33% {border-radius:45% 55% 40% 60% / 60% 42% 58% 40%}
  66% {border-radius:62% 38% 58% 42% / 40% 55% 45% 60%}
  100%{border-radius:40% 60% 48% 52% / 55% 45% 60% 40%}
}
.piece .num{font-size:1.1rem;font-style:italic;opacity:.55;letter-spacing:.2em}

/* индикатор температуры под кляксой */
.temp{width:80px;height:3px;border-radius:2px;background:linear-gradient(90deg,#5aa7e0,#e07a5a);position:relative}
.temp i{position:absolute;top:-3px;width:9px;height:9px;border-radius:50%;background:#fff;transform:translateX(-50%)}

/* модалка */
.modal{position:fixed;inset:0;display:none;background:rgba(8,9,14,.95);z-index:100;
  align-items:center;justify-content:center;flex-direction:column}
.modal.open{display:flex}
.modal img{max-width:90vw;max-height:82vh;border-radius:6px}
.modal .bar{margin-top:16px;display:flex;gap:26px;align-items:center;font-size:1.3rem}
.modal button{background:none;border:1px solid rgba(232,230,240,.3);color:#e8e6f0;
  width:44px;height:44px;border-radius:50%;font-size:1.2rem;cursor:pointer}
.modal button:hover{background:rgba(232,230,240,.12)}
.modal .x{position:absolute;top:24px;right:32px;font-size:2rem;border:none;width:auto;height:auto}
</style>
</head>
<body>
<div class="marble"></div>
<header>
  <h1>НАДЕЖДА КОВ</h1>
  <p class="subtitle">fluid art — течение</p>
  <p class="hint">листайте вбок · краска не стоит на месте</p>
</header>

<div class="river" id="river"></div>

<div class="modal" id="modal">
  <button class="x" id="closeBtn">×</button>
  <img id="modalImg" alt="">
  <div class="bar"><button id="prevBtn">‹</button><span id="counter"></span><button id="nextBtn">›</button></div>
</div>

<script src="images-data.js"></script>
<script>
const data=window.imagesData;
const river=document.getElementById('river');
data.forEach((im,i)=>{
  const t=Math.max(-0.3,Math.min(0.3,im.temperature??0));
  const pct=((t+0.3)/0.6)*100;
  const el=document.createElement('div');
  el.className='piece';
  el.innerHTML=`<div class="blob"><img src="${im.thumbnail}" alt="${im.name}" loading="lazy"></div>
    <span class="num">${String(i+1).padStart(2,'0')}</span>
    <span class="temp"><i style="left:${pct}%"></i></span>`;
  el.addEventListener('click',()=>open(i));
  river.appendChild(el);
});
// колесо мыши = горизонтальный скролл
river.addEventListener('wheel',e=>{if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){e.preventDefault();river.scrollLeft+=e.deltaY}},{passive:false});
// модалка
const modal=document.getElementById('modal'),mImg=document.getElementById('modalImg'),counter=document.getElementById('counter');let cur=0;
function open(i){cur=i;mImg.src=data[i].full;counter.textContent=(i+1)+' / '+data.length;modal.classList.add('open');document.body.style.overflow='hidden'}
function close(){modal.classList.remove('open');document.body.style.overflow=''}
function nav(s){open((cur+s+data.length)%data.length)}
closeBtn.onclick=close;prevBtn.onclick=()=>nav(-1);nextBtn.onclick=()=>nav(1);
modal.onclick=e=>{if(e.target===modal)close()};
document.addEventListener('keydown',e=>{if(!modal.classList.contains('open'))return;
  if(e.key==='Escape')close();if(e.key==='ArrowLeft')nav(-1);if(e.key==='ArrowRight')nav(1)});
</script>
</body>
</html>
